<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>My Cinema</title>
<style>
  :root { --accent: #e50914; --bg: #0b0e12; --card: #181f27; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; overflow-x: hidden; }
  .hidden { display: none !important; }

  /* Setup */
  #setup { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 16px; padding: 40px; text-align: center; }
  #setup input { font-size: 20px; padding: 12px 16px; border-radius: 10px; border: 1px solid #333; background: var(--card); color: #fff; width: min(480px, 90vw); }
  #setup button, #player-back { font-size: 18px; padding: 12px 28px; border-radius: 10px; border: none; background: var(--accent); color: #fff; cursor: pointer; }
  #setup p { color: #9aa4af; max-width: 560px; line-height: 1.5; }
  #setup a { color: #66dbf9; }

  /* Browse */
  #browse { padding: 40px 50px 80px; }
  #browse h1 { font-size: 34px; margin-bottom: 18px; }
  #search { font-size: 20px; padding: 12px 16px; border-radius: 10px; border: 1px solid #333; background: var(--card); color: #fff; width: min(560px, 90vw); margin-bottom: 26px; }
  .row-title { font-size: 22px; margin: 26px 0 10px; color: #d7dde3; }
  .row { display: flex; gap: 14px; overflow-x: auto; padding: 8px 4px 14px; scroll-behavior: smooth; }
  .card { flex: 0 0 150px; cursor: pointer; border-radius: 12px; outline: 3px solid transparent; transition: transform .15s, outline-color .15s; }
  .card img { width: 150px; height: 225px; object-fit: cover; border-radius: 12px; background: var(--card); display: block; }
  .card .t { font-size: 13px; color: #b9c2cb; padding: 6px 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 150px; }
  .card .bar { height: 4px; border-radius: 2px; background: #2a323b; margin-top: 4px; overflow: hidden; }
  .card .bar > div { height: 100%; background: var(--accent); }
  .card.focused { transform: scale(1.07); outline-color: #fff; }

  /* Player */
  #player { position: fixed; inset: 0; background: #000; z-index: 10; }
  #player iframe { width: 100%; height: 100%; border: 0; }
  #player-back { position: absolute; top: 18px; left: 18px; opacity: .85; z-index: 11; }
</style>
</head>
<body>

<div id="setup" class="hidden">
  <h1>🎬 My Cinema</h1>
  <p>Browse and search come from TMDB. Paste a free TMDB API key once —
     create one at <a href="https://www.themoviedb.org/settings/api" target="_blank">themoviedb.org/settings/api</a>
     (API Key / “v3 auth”).</p>
  <input id="key-input" placeholder="TMDB API key" autofocus>
  <button onclick="saveKey()">Save</button>
</div>

<div id="browse" class="hidden">
  <h1>🎬 My Cinema</h1>
  <input id="search" placeholder="Search movies & series… (press / to focus)">
  <div id="rows"></div>
</div>

<div id="player" class="hidden">
  <button id="player-back" onclick="closePlayer()">‹ Back</button>
  <iframe id="player-frame" allowfullscreen allow="autoplay; fullscreen; encrypted-media"></iframe>
</div>

<script>
const TMDB = "https://api.themoviedb.org/3";
const IMG = "https://image.tmdb.org/t/p/w342";
const PROGRESS_KEY = "cinema-progress";
let rows = [];            // [{title, items:[...]}]
let focus = { row: 0, col: 0 };
let playing = null;       // item currently in the player

const key = () => localStorage.getItem("tmdb-key");
const progress = () => JSON.parse(localStorage.getItem(PROGRESS_KEY) || "{}");

function saveKey() {
  const value = document.getElementById("key-input").value.trim();
  if (!value) return;
  localStorage.setItem("tmdb-key", value);
  boot();
}

async function tmdb(path, params = {}) {
  const url = new URL(TMDB + path);
  url.searchParams.set("api_key", key());
  for (const [k, v] of Object.entries(params)) url.searchParams.set(k, v);
  const response = await fetch(url);
  if (response.status === 401) { localStorage.removeItem("tmdb-key"); boot(); throw new Error("bad key"); }
  return response.json();
}

function normalize(raw, mediaType) {
  return {
    id: raw.id,
    type: mediaType || raw.media_type,
    title: raw.title || raw.name,
    poster: raw.poster_path ? IMG + raw.poster_path : null,
  };
}

async function boot() {
  document.getElementById("setup").classList.toggle("hidden", !!key());
  document.getElementById("browse").classList.toggle("hidden", !key());
  if (!key()) return;
  const [movies, tv] = await Promise.all([
    tmdb("/trending/movie/week"), tmdb("/trending/tv/week"),
  ]);
  rows = [];
  const continueRow = continueWatching();
  if (continueRow.length) rows.push({ title: "Continue Watching", items: continueRow });
  rows.push({ title: "Trending Movies", items: movies.results.map(r => normalize(r, "movie")) });
  rows.push({ title: "Trending Series", items: tv.results.map(r => normalize(r, "tv")) });
  focus = { row: 0, col: 0 };
  render();
}

function continueWatching() {
  return Object.values(progress())
    .filter(p => p.duration && p.currentTime > 60 && p.currentTime / p.duration < 0.95)
    .sort((a, b) => b.updated - a.updated)
    .slice(0, 15);
}

function render() {
  const container = document.getElementById("rows");
  container.innerHTML = "";
  rows.forEach((row, ri) => {
    const h = document.createElement("div");
    h.className = "row-title"; h.textContent = row.title;
    container.appendChild(h);
    const strip = document.createElement("div");
    strip.className = "row";
    row.items.forEach((item, ci) => {
      const card = document.createElement("div");
      card.className = "card" + (ri === focus.row && ci === focus.col ? " focused" : "");
      const pct = item.duration ? Math.round(100 * item.currentTime / item.duration) : 0;
      card.innerHTML =
        `<img src="${item.poster || ""}" loading="lazy">` +
        `<div class="t">${item.title}${item.type === "tv" && item.season ? ` · S${item.season}E${item.episode}` : ""}</div>` +
        (pct ? `<div class="bar"><div style="width:${pct}%"></div></div>` : "");
      card.onclick = () => open(item);
      strip.appendChild(card);
    });
    container.appendChild(strip);
  });
  const focused = document.querySelector(".card.focused");
  if (focused) focused.scrollIntoView({ block: "center", inline: "center", behavior: "smooth" });
}

async function runSearch(query) {
  if (!query) { boot(); return; }
  const data = await tmdb("/search/multi", { query });
  const items = data.results
    .filter(r => r.media_type === "movie" || r.media_type === "tv")
    .map(r => normalize(r));
  rows = [{ title: `Results for “${query}”`, items }];
  focus = { row: 0, col: 0 };
  render();
}

function open(item) {
  const saved = progress()[item.type + item.id] || {};
  const params = new URLSearchParams({ color: "e50914", autoPlay: "true" });
  let src;
  if (item.type === "tv") {
    const season = item.season || saved.season || 1;
    const episode = item.episode || saved.episode || 1;
    params.set("nextEpisode", "true");
    params.set("episodeSelector", "true");
    if (saved.season === season && saved.episode === episode && saved.currentTime > 60) {
      params.set("progress", Math.floor(saved.currentTime));
    }
    src = `https://www.vidking.net/embed/tv/${item.id}/${season}/${episode}?${params}`;
    playing = { ...item, season, episode };
  } else {
    if (saved.currentTime > 60) params.set("progress", Math.floor(saved.currentTime));
    src = `https://www.vidking.net/embed/movie/${item.id}?${params}`;
    playing = { ...item };
  }
  document.getElementById("player-frame").src = src;
  document.getElementById("player").classList.remove("hidden");
  history.pushState({ player: true }, "");
}

function closePlayer() {
  document.getElementById("player").classList.add("hidden");
  document.getElementById("player-frame").src = "";
  playing = null;
  boot(); // refresh Continue Watching
}
window.onpopstate = () => { if (playing) closePlayer(); };

// Watch-progress from the Vidking player (PLAYER_EVENT postMessages).
window.addEventListener("message", (event) => {
  if (!playing) return;
  let payload = event.data;
  if (typeof payload === "string") { try { payload = JSON.parse(payload); } catch { return; } }
  if (!payload || payload.type !== "PLAYER_EVENT" || !payload.data) return;
  const d = payload.data;
  if (typeof d.currentTime !== "number") return;
  const store = progress();
  store[playing.type + playing.id] = {
    ...playing,
    currentTime: d.currentTime,
    duration: d.duration || store[playing.type + playing.id]?.duration || 0,
    season: d.season || playing.season,
    episode: d.episode || playing.episode,
    updated: Date.now(),
  };
  localStorage.setItem(PROGRESS_KEY, JSON.stringify(store));
});

// D-pad / keyboard navigation.
document.addEventListener("keydown", (event) => {
  const search = document.getElementById("search");
  if (event.key === "/" && document.activeElement !== search) {
    event.preventDefault(); search.focus(); return;
  }
  if (document.activeElement === search) {
    if (event.key === "Enter") { runSearch(search.value.trim()); search.blur(); }
    if (event.key === "ArrowDown") search.blur();
    return;
  }
  if (playing) {
    if (event.key === "Backspace") closePlayer();
    return;
  }
  if (!rows.length) return;
  const row = () => rows[focus.row].items;
  switch (event.key) {
    case "ArrowLeft":  focus.col = Math.max(0, focus.col - 1); break;
    case "ArrowRight": focus.col = Math.min(row().length - 1, focus.col + 1); break;
    case "ArrowUp":
      if (focus.row === 0) { search.focus(); return; }
      focus.row--; focus.col = Math.min(focus.col, row().length - 1); break;
    case "ArrowDown":
      focus.row = Math.min(rows.length - 1, focus.row + 1);
      focus.col = Math.min(focus.col, row().length - 1); break;
    case "Enter": open(row()[focus.col]); return;
    case "Backspace": boot(); return;
    default: return;
  }
  event.preventDefault();
  render();
});

boot();
</script>
</body>
</html>
